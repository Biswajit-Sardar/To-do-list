<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Details</title>
</head>
<body>

<div class="nav-bar">
    <h1>THE BEST HIGH SCHOOL</h1>
    <p>New student registration form</p>
    <div>PLEASE FILL ALL CONTENT</div>
</div>

<form>

<!-- Student Information -->
<div class="student-information">
    <h3>Student Information</h3>

    <label>Student Name:</label>
    <input type="text" name="student_name"><br><br>

    <label>Home Address:</label>
    <input type="text" name="student_address"><br><br>

    <label>City:</label>
    <input type="text" name="student_city"><br><br>

    <label>State:</label>
    <input type="text" name="student_state"><br><br>

    <label>ZIP Code:</label>
    <input type="number" name="student_zip"><br><br>

    <label>Email:</label>
    <input type="email" name="student_email"><br><br>

    <label>Home Phone:</label>
    <input type="tel" name="student_phone"><br><br>

    <label>Date of Birth:</label>
    <input type="date" name="dob"><br><br>

    <label>Gender:</label>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female<br><br>

    <label>Country:</label>
    <input type="text" name="country"><br><br>
</div>

<!-- Guardian Information -->
<div class="guardian-information">
    <h3>Parent / Guardian Information</h3>

    <label>Guardian Name:</label>
    <input type="text" name="guardian_name"><br><br>

    <label>Home Address:</label>
    <input type="text" name="guardian_address"><br><br>

    <label>City:</label>
    <input type="text" name="guardian_city"><br><br>

    <label>State:</label>
    <input type="text" name="guardian_state"><br><br>

    <label>ZIP Code:</label>
    <input type="number" name="guardian_zip"><br><br>

    <label>Relation:</label>
    <input type="text" name="relation"><br><br>
</div>

<button type="submit">Submit</button>

</form>

</body>
</html>
